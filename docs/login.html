<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITCO Trade Management - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase v9 compat scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="bg-gradient-to-br from-green-50 via-emerald-50 to-green-100 min-h-screen flex items-center justify-center p-4 relative">
    
    <!-- Floating Vegetables and Fruits Background -->
    <div class="floating-item">🥕</div>
    <div class="floating-item">🍅</div>
    <div class="floating-item">🥬</div>
    <div class="floating-item">🍊</div>
    <div class="floating-item">🥒</div>
    <div class="floating-item">🍎</div>
    <div class="floating-item">🥔</div>
    <div class="floating-item">🍌</div>
    
    <!-- Login Container -->
    <div id="loginContainer" class="w-full max-w-md slide-up relative z-10">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border-4 border-emerald-400">
            <!-- Header with Vegetable/Fruit Theme -->
            <div class="gradient-bg px-8 py-10 text-center relative overflow-hidden">
                <!-- Decorative vegetables at top corners -->
                <div class="absolute top-2 left-2 text-4xl animate-pulse">🥕</div>
                <div class="absolute top-2 right-2 text-4xl animate-pulse" style="animation-delay: 0.5s;">🍅</div>
                
                <div class="w-24 h-24 bg-white rounded-full mx-auto mb-4 flex items-center justify-center shadow-2xl pulse-logo relative">
                    <!-- Vegetable basket icon -->
                    <div class="text-6xl">🧺</div>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2 drop-shadow-lg">ISHWAR TRADING COMPANY</h1>
                <p class="text-emerald-50 font-medium text-lg">Fresh Vegetables & Fruits Trading</p>
                <p class="text-emerald-100 text-sm mt-2">🌱 Farm to Market 🌱</p>
            </div>
            
            <!-- Login Form -->
            <div class="px-8 py-8">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-semibold mb-2 flex items-center" for="email">
                            <span class="mr-2">📧</span> Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            required
                            class="w-full px-4 py-3 border-2 border-emerald-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition"
                            placeholder="Enter your email"
                        >
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-semibold mb-2 flex items-center" for="password">
                            <span class="mr-2">🔒</span> Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                required
                                class="w-full px-4 py-3 border-2 border-emerald-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition"
                                placeholder="Enter your password"
                            >
                            <button 
                                type="button" 
                                onclick="togglePasswordVisibility()"
                                class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                            >
                                <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-emerald-500">
                            <span class="ml-2 text-sm text-gray-600">Remember me</span>
                        </label>
                        <a href="#" onclick="showForgotPassword(event)" class="text-sm text-emerald-600 hover:text-emerald-800 font-semibold">
                            Forgot Password?
                        </a>
                    </div>
                    
                    <button 
                        type="submit" 
                        id="loginButton"
                        class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white py-3 rounded-lg font-semibold hover:from-emerald-600 hover:to-green-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition transform hover:scale-[1.02] shine-effect shadow-lg"
                    >
                        🚀 Sign In
                    </button>
                </form>
            </div>
        </div>
        
        <!-- Error Message -->
        <div id="errorMessage" class="hidden mt-4 bg-red-50 border-2 border-red-400 text-red-700 px-4 py-3 rounded-lg slide-up shadow-lg">
            <div class="flex items-center">
                <span class="text-2xl mr-3">⚠️</span>
                <span id="errorText" class="font-medium"></span>
            </div>
        </div>
        
        <!-- Success Message -->
        <div id="successMessage" class="hidden mt-4 bg-emerald-50 border-2 border-emerald-400 text-emerald-700 px-4 py-3 rounded-lg slide-up shadow-lg">
            <div class="flex items-center">
                <span class="text-2xl mr-3 bounce">✅</span>
                <span id="successText" class="font-medium"></span>
            </div>
        </div>
    </div>
    
    <!-- Forgot Password Container (Hidden by default) -->
    <div id="forgotPasswordContainer" class="hidden w-full max-w-md slide-up relative z-10">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border-4 border-emerald-400">
            <!-- Header -->
            <div class="gradient-bg px-8 py-10 text-center relative overflow-hidden">
                <div class="absolute top-2 left-2 text-4xl animate-pulse">🔑</div>
                <div class="absolute top-2 right-2 text-4xl animate-pulse" style="animation-delay: 0.5s;">🥬</div>
                
                <div class="w-24 h-24 bg-white rounded-full mx-auto mb-4 flex items-center justify-center shadow-2xl pulse-logo">
                    <div class="text-5xl">🔐</div>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2 drop-shadow-lg">Reset Password</h1>
                <p class="text-emerald-50 font-medium">ISHWAR TRADING COMPANY</p>
                <p class="text-emerald-100 text-sm mt-2">🌱 Farm to Market 🌱</p>
            </div>
            
            <!-- Forgot Password Form -->
            <div class="px-8 py-8">
                <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-semibold mb-2 flex items-center" for="resetEmail">
                            <span class="mr-2">📧</span> Email Address
                        </label>
                        <input 
                            type="email" 
                            id="resetEmail" 
                            required
                            class="w-full px-4 py-3 border-2 border-emerald-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition"
                            placeholder="Enter your email"
                        >
                        <p class="text-xs text-gray-500 mt-2">Enter the email associated with your account</p>
                    </div>
                    
                    <button 
                        type="submit" 
                        id="resetButton"
                        class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white py-3 rounded-lg font-semibold hover:from-emerald-600 hover:to-green-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition transform hover:scale-[1.02] shine-effect shadow-lg"
                    >
                        🔑 Send Reset Link
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <a href="#" onclick="showLogin(event)" class="text-emerald-600 hover:text-emerald-800 font-semibold text-sm">
                        ← Back to Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
